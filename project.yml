name: YTMusicMac
options:
  bundleIdPrefix: com.ytmusicmac
  createIntermediateGroups: true
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.4
settings:
  base:
    SWIFT_VERSION: "5.0"
targets:
  YTMusicMac:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Sources
    dependencies:
      - package: Sparkle
    settings:
      base:
        PRODUCT_NAME: YTMusicMac
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: Sources/YTMusicMac.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_SUFeedURL: "https://raw.githubusercontent.com/jinsh1210/YTMusicMac/main/appcast.xml"
        INFOPLIST_KEY_SUPublicEDKey: "YOUR_PUBLIC_KEY_HERE" # Replace with real key
        INFOPLIST_KEY_NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        INFOPLIST_KEY_NSCameraUsageDescription: "This app needs access to camera if needed for login."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "This app needs access to microphone if needed for audio playback."
        INFOPLIST_KEY_NSAppleEventsUsageDescription: "This app needs access to system events for media control."
        SWIFT_VERSION: "5.0"
    postBuildScripts:
      - name: SwiftFormat
        inputFiles:
          - "$(SRCROOT)/Sources"
        outputFiles:
          - "$(DERIVED_FILE_DIR)/swiftformat.stamp"
        basedOnDependencyAnalysis: true
        script: |
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if which swiftformat >/dev/null; then
            swiftformat . --swiftversion 5.0 || echo "warning: SwiftFormat failed"
            touch "$(DERIVED_FILE_DIR)/swiftformat.stamp"
          else
            echo "warning: SwiftFormat not installed"
          fi
      - name: SwiftLint
        inputFiles:
          - "$(SRCROOT)/Sources"
        outputFiles:
          - "$(DERIVED_FILE_DIR)/swiftlint.stamp"
        basedOnDependencyAnalysis: true
        script: |
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if which swiftlint >/dev/null; then
            swiftlint lint --strict || echo "warning: SwiftLint crashed or failed"
            touch "$(DERIVED_FILE_DIR)/swiftlint.stamp"
          else
            echo "warning: SwiftLint not installed"
          fi
  YTMusicMacTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Tests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.0"
    dependencies:
      - target: YTMusicMac
