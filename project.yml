            // žĚľŽįėž†ĀžĚł YouTube Ž©ĒžĚł ŪéėžĚīžßÄ ž†ĎÍ∑ľžĚÄ YouTube MusicžúľŽ°ú Ž¶¨Žč§žĚīŽ†ČŪäł (ÍĻúŽĻ°žěĄ Žį©žßÄŽ•ľ žúĄŪēī Ž°úÍ∑łžĚł Í≤ĹŽ°ú ž†úžôł)
            if host == "www.youtube.com" && (path == "/" || path == "") {
