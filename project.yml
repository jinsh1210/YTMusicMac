name: YTMusicMac
options:
  bundleIdPrefix: com.ytmusicmac
  createIntermediateGroups: true
  xcodeVersion: "15.0"
  objectVersion: 56
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.4
settings:
  base:
    SWIFT_VERSION: "5.0"
targets:
  YTMusicMac:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Sources
    dependencies:
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_NAME: YTMusicMac
        MARKETING_VERSION: 0.1.14
        CURRENT_PROJECT_VERSION: 14
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: Sources/YTMusicMac.entitlements
        INFOPLIST_FILE: Sources/Info.plist
        SWIFT_VERSION: "5.0"
        LD_RUNPATH_SEARCH_PATHS: $(inherited) @loader_path/../Frameworks
    postBuildScripts:
      - name: SwiftFormat
        inputFiles:
          - "$(SRCROOT)/Sources"
        outputFiles:
          - "${DERIVED_FILE_DIR}/swiftformat.stamp"
        basedOnDependencyAnalysis: true
        script: |
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if which swiftformat >/dev/null; then
            swiftformat . --swiftversion 5.0 || echo "warning: SwiftFormat failed"
            if [ -n "${DERIVED_FILE_DIR}" ]; then
              touch "${DERIVED_FILE_DIR}/swiftformat.stamp"
            fi
          else
            echo "warning: SwiftFormat not installed"
          fi
      - name: SwiftLint
        inputFiles:
          - "$(SRCROOT)/Sources"
        outputFiles:
          - "${DERIVED_FILE_DIR}/swiftlint.stamp"
        basedOnDependencyAnalysis: true
        script: |
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if which swiftlint >/dev/null; then
            swiftlint lint --strict || echo "warning: SwiftLint crashed or failed"
            if [ -n "${DERIVED_FILE_DIR}" ]; then
              touch "${DERIVED_FILE_DIR}/swiftlint.stamp"
            fi
          else
            echo "warning: SwiftLint not installed"
          fi
  YTMusicMacTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Tests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.0"
    dependencies:
      - target: YTMusicMac
