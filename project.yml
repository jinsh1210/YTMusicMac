            decisionHandler(.allow)
            return
        }

        if navigationAction.targetFrame?.isMainFrame == true {
            // Ž°úÍ∑łžĚł ž§ĎžĚīžóąÍ≥†, YouTube Ž©ĒžĚł ŪéėžĚīžßÄŽ°ú ŽŹĆžēĄžôĒŽč§Ž©ī Ž°úÍ∑łžĚł žĄĪÍ≥ĶžúľŽ°ú ÍįĄž£ľŪēėžó¨ Ž¶¨Žč§žĚīŽ†ČŪäł
