name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Xcode Version
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build App
        run: |
          xcodebuild -project YTMusicMac.xcodeproj \
                     -scheme YTMusicMac \
                     -configuration Release \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     clean build

      - name: Create DMG
        run: |
          brew install create-dmg
          APP_PATH="build/Build/Products/Release/YTMusicMac.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Error: App not found at $APP_PATH"
            exit 1
          fi

          mkdir -p dmg_root
          cp -R "$APP_PATH" dmg_root/

          create-dmg \
            --volname "YTMusicMac" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "YTMusicMac.app" 175 120 \
            --hide-extension "YTMusicMac.app" \
            --app-drop-link 425 120 \
            "YTMusicMac.dmg" \
            "dmg_root/"

      - name: Sign DMG and Update Appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          # Extract build number from project.yml
          BUILD_NUM=$(grep 'CURRENT_PROJECT_VERSION:' project.yml | awk '{print $2}')

          # Sparkle 툴 다운로드 및 압축 해제
          curl -L "https://github.com/sparkle-project/Sparkle/releases/download/2.9.1/Sparkle-2.9.1.tar.xz" \
            -o sparkle.tar.xz
          mkdir -p sparkle_bin
          tar -xf sparkle.tar.xz -C sparkle_bin
          
          SIGN_UPDATE=$(find sparkle_bin -name sign_update -type f | head -1)
          if [ -z "$SIGN_UPDATE" ]; then
            echo "Error: sign_update not found."
            exit 1
          fi
          echo "Found sign_update at: $SIGN_UPDATE"
          chmod +x "$SIGN_UPDATE"

          # Sign DMG using private key file (avoiding keychain issues in CI)
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "Error: SPARKLE_PRIVATE_KEY secret is not set."
            exit 1
          fi
          echo "$SPARKLE_PRIVATE_KEY" > sparkle_key.txt
          SIGN_INFO=$("$SIGN_UPDATE" --ed-key-file sparkle_key.txt YTMusicMac.dmg)
          rm sparkle_key.txt

          ED_SIG=$(echo "$SIGN_INFO" | sed 's/.*sparkle:edSignature="\([^"]*\)".*/\1/')
          FILE_SIZE=$(echo "$SIGN_INFO" | sed 's/.*length="\([^"]*\)".*/\1/')

          echo "Signature: $ED_SIG"
          echo "File size: $FILE_SIZE"

          # Push updated appcast.xml to main (Check out BEFORE generating file)
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git fetch origin main
          git checkout main

          # Generate appcast.xml with correct signature and file info
          PUB_DATE=$(date -u +"%a, %d %b %Y %H:%M:%S +0000")
          {
            printf '<?xml version="1.0" standalone="yes"?>\n'
            printf '<rss xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" version="2.0">\n'
            printf '    <channel>\n'
            printf '        <title>YTMusicMac Changelog</title>\n'
            printf '        <link>https://raw.githubusercontent.com/jinsh1210/YTMusicMac/main/appcast.xml</link>\n'
            printf '        <description>Most recent changes with links to updates.</description>\n'
            printf '        <language>en</language>\n'
            printf '        <item>\n'
            printf '            <title>Version %s</title>\n' "$VERSION"
            printf '            <sparkle:releaseNotesLink>\n'
            printf '                https://raw.githubusercontent.com/jinsh1210/YTMusicMac/main/CHANGELOG.md\n'
            printf '            </sparkle:releaseNotesLink>\n'
            printf '            <pubDate>%s</pubDate>\n' "$PUB_DATE"
            printf '            <enclosure url="https://github.com/jinsh1210/YTMusicMac/releases/download/%s/YTMusicMac.dmg"\n' "$TAG"
            printf '                       sparkle:version="%s"\n' "$BUILD_NUM"
            printf '                       sparkle:shortVersionString="%s"\n' "$VERSION"
            printf '                       sparkle:edSignature="%s"\n' "$ED_SIG"
            printf '                       length="%s"\n' "$FILE_SIZE"
            printf '                       type="application/octet-stream" />\n'
            printf '        </item>\n'
            printf '    </channel>\n'
            printf '</rss>\n'
          } > appcast.xml

          git add appcast.xml
          git commit -m "chore: update appcast for ${TAG}" || echo "No changes to commit"
          git push origin main

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: YTMusicMac.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
