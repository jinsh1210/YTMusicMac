name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Xcode Version
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build App
        run: |
          xcodebuild -project YTMusicMac.xcodeproj \
                     -scheme YTMusicMac \
                     -configuration Release \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     clean build

      - name: Create DMG
        run: |
          brew install create-dmg
          APP_PATH="build/Build/Products/Release/YTMusicMac.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Error: App not found at $APP_PATH"
            exit 1
          fi
          
          # Create a temporary folder for DMG content
          mkdir -p dmg_root
          cp -R "$APP_PATH" dmg_root/
          
          # Generate pretty DMG
          create-dmg \
            --volname "YTMusicMac" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "YTMusicMac.app" 175 120 \
            --hide-extension "YTMusicMac.app" \
            --app-drop-link 425 120 \
            "YTMusicMac.dmg" \
            "dmg_root/"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: YTMusicMac.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
