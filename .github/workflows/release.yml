name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version is already tagged
        id: check_tag
        run: |
          VERSION=$(grep 'MARKETING_VERSION:' project.yml | awk '{print $2}')
          TAG="v$VERSION"
          git fetch --tags
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Version $VERSION is already tagged ($TAG). Skipping release."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Version $VERSION is new ($TAG). Proceeding with release."
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag=$TAG" >> $GITHUB_OUTPUT
          fi

      - name: Set Xcode Version
        if: steps.check_tag.outputs.exists == 'false'
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install XcodeGen
        if: steps.check_tag.outputs.exists == 'false'
        run: brew install xcodegen

      - name: Generate Xcode Project
        if: steps.check_tag.outputs.exists == 'false'
        run: xcodegen generate

      - name: Build App
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          xcodebuild -project YTMusicMac.xcodeproj \
                     -scheme YTMusicMac \
                     -configuration Release \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     clean build

      - name: Create DMG
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          brew install create-dmg
          APP_PATH="build/Build/Products/Release/YTMusicMac.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Error: App not found at $APP_PATH"
            exit 1
          fi

          mkdir -p dmg_root
          cp -R "$APP_PATH" dmg_root/

          create-dmg \
            --volname "YTMusicMac" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "YTMusicMac.app" 175 120 \
            --hide-extension "YTMusicMac.app" \
            --app-drop-link 425 120 \
            "YTMusicMac.dmg" \
            "dmg_root/"

      - name: Sign DMG and Update Appcast
        if: steps.check_tag.outputs.exists == 'false'
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          TAG="${{ steps.check_tag.outputs.tag }}"
          VERSION="${{ steps.check_tag.outputs.version }}"
          BUILD_NUM=$(grep 'CURRENT_PROJECT_VERSION:' project.yml | awk '{print $2}')

          # Sparkle 툴 다운로드 및 압축 해제
          curl -L "https://github.com/sparkle-project/Sparkle/releases/download/2.9.1/Sparkle-2.9.1.tar.xz" \
            -o sparkle.tar.xz
          mkdir -p sparkle_bin
          tar -xf sparkle.tar.xz -C sparkle_bin
          
          SIGN_UPDATE=$(find sparkle_bin -name sign_update -type f | head -1)
          chmod +x "$SIGN_UPDATE"

          # Sign DMG using private key
          echo "$SPARKLE_PRIVATE_KEY" > sparkle_key.txt
          SIGN_INFO=$("$SIGN_UPDATE" --ed-key-file sparkle_key.txt YTMusicMac.dmg)
          rm sparkle_key.txt

          ED_SIG=$(echo "$SIGN_INFO" | sed 's/.*sparkle:edSignature="\([^"]*\)".*/\1/')
          FILE_SIZE=$(echo "$SIGN_INFO" | sed 's/.*length="\([^"]*\)".*/\1/')

          # Update appcast.xml on gh-pages branch
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          
          git fetch origin gh-pages
          git checkout gh-pages
          
          PUB_DATE=$(date -u +"%a, %d %b %Y %H:%M:%S +0000")
          
          # 새 아이템 생성
          NEW_ITEM_CONTENT=$(cat <<EOF
        <item>
            <title>Version $VERSION</title>
            <sparkle:releaseNotesLink>https://raw.githubusercontent.com/jinsh1210/YTMusicMac/main/CHANGELOG.md</sparkle:releaseNotesLink>
            <pubDate>$PUB_DATE</pubDate>
            <enclosure url="https://github.com/jinsh1210/YTMusicMac/releases/download/$TAG/YTMusicMac.dmg" sparkle:version="$BUILD_NUM" sparkle:shortVersionString="$VERSION" sparkle:edSignature="$ED_SIG" length="$FILE_SIZE" type="application/octet-stream" />
        </item>
EOF
)
          
          # 최신 버전 아이템을 상단에 추가하기 위해 임시 파일 생성
          # <channel> 뒤에 삽입하는 안전한 방식
          awk -v item="$NEW_ITEM_CONTENT" '{print} /<channel>/ {print item}' appcast.xml > appcast.xml.new
          mv appcast.xml.new appcast.xml

          git add appcast.xml
          git commit -m "chore: update appcast for ${TAG} (automated)"
          git push origin gh-pages

      - name: Create Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check_tag.outputs.tag }}
          name: ${{ steps.check_tag.outputs.tag }}
          files: YTMusicMac.dmg
          body: "Automated release for ${{ steps.check_tag.outputs.tag }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
